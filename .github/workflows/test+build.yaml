name: test-and-build
on:
  push:
    branches:
      - main
    pull_request:
    workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: sync
        run: uv sync
      - name: test
        run: uv run pytest
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: sync
        run: uv sync
      - name: build
        run: uv build